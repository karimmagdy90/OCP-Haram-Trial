apiVersion: v1
kind: Secret
metadata:
  name: config-bundle-secret
  namespace: quay-enterprise
stringData:
  config.yaml: |
    ALLOW_PULLS_WITHOUT_STRICT_LOGGING: false
    AUTHENTICATION_TYPE: Database
    DEFAULT_TAG_EXPIRATION: 2w
    ENTERPRISE_LOGO_URL: /static/img/RH_Logo_Quay_Black_UX-horizontal.svg
    FEATURE_BUILD_SUPPORT: false
    FEATURE_MAILING: false
    SETUP_COMPLETE: true
    TAG_EXPIRATION_OPTIONS:
      - 2w
    TEAM_RESYNC_STALE_TIME: 60m
    TESTING: false
    CREATE_NAMESPACE_ON_PUSH: true
    REGISTRY_TITLE: Telecom Egypt Enterprise Container Image Registry
    REGISTRY_TITLE_SHORT: TE Enterprise CIR
    FEATURE_REPO_MIRROR: true
    REPO_MIRROR_INTERVAL: 60
    FEATURE_USER_INITIALIZE: true
    BROWSER_API_CALLS_XHR_ONLY: false
    SUPER_USERS:
      - quayadmin
    FEATURE_USER_CREATION: false
    FEATURE_SUPERUSERS_ORG_CREATION_ONLY: true
    PREFERRED_URL_SCHEME: https
    SERVER_HOSTNAME: registry.apps.auto-hub.telco.te
    SSL_CIPHERS:
      - ECDHE-RSA-AES128-GCM-SHA256
    SSL_PROTOCOLS:
      - TLSv1.3
    SESSION_COOKIE_SECURE: true
    AVATAR_KIND: local
    FEATURE_DIRECT_LOGIN: true
    FEATURE_LIBRARY_SUPPORT: false