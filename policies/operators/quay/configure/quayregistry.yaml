apiVersion: quay.redhat.com/v1
kind: QuayRegistry
metadata:
  name: registry2
  namespace: quay-enterprise
spec:
  components:
  - kind: clair
    managed: false
  - kind: postgres
    managed: true
  - kind: objectstorage
    managed: true
  - kind: redis
    managed: true
  - kind: horizontalpodautoscaler
    managed: false
  - kind: route
    managed: true
  - kind: mirror
    managed: true
  - kind: monitoring
    managed: true
  - kind: tls
    managed: true
  - kind: quay
    managed: true
    overrides:
      replicas: 2
      resources:
        limits:
          cpu: "6"
          memory: 12Gi
        requests:
          cpu: "6"
          memory: 12Gi
  - kind: clairpostgres
    managed: false
