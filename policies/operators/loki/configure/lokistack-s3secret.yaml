apiVersion: v1
kind: Secret
metadata:
  name: logging-loki-odf
  namespace: openshift-logging
type: Opaque
data:
  # fromSecret returns the value already base64-encoded (Secret .data is base64),
  # so these go into data: verbatim — no base64enc.
  access_key_id: '{{ fromSecret "openshift-logging" "loki-bucket-odf" "AWS_ACCESS_KEY_ID" }}'
  access_key_secret: '{{ fromSecret "openshift-logging" "loki-bucket-odf" "AWS_SECRET_ACCESS_KEY" }}'
  # fromConfigMap returns plaintext, so it must be base64enc'd to sit in data:.
  # BUCKET_NAME carries the OBC random suffix, resolving the static-name issue.
  bucketnames: '{{ fromConfigMap "openshift-logging" "loki-bucket-odf" "BUCKET_NAME" | base64enc }}'
  endpoint: '{{ printf "https://%s:%s" (fromConfigMap "openshift-logging" "loki-bucket-odf" "BUCKET_HOST") (fromConfigMap "openshift-logging" "loki-bucket-odf" "BUCKET_PORT") | base64enc }}'
